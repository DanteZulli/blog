baseURL = "https://www.dantezulli.ar"
title = "Dante's Blog"
copyright = "Dante Zulli (CC BY 4.0)"
defaultContentLanguage = "es"
enableRobotsTXT = true

[[menu.main]]
  name = "Blog"
  url = "/blog/"
  weight = 1
[[menu.main]]
  name = "Projects"
  url = "/projects/"
  weight = 2

[markup]
  [markup.highlight]
    lineNos = true
    lineNumbersInTable = false
    noClasses = false

[languages]
[languages.es]
    languageName = "es-AR"
    LanguageCode = "es-AR"
    contentDir = "content"
    [languages.es.params]
      madeWith = "Hecho con [Bear Cub](https://github.com/clente/hugo-bearcub)"
[languages.en]
  languageName = "en-US"
  LanguageCode = "en-US"
  contentDir = "content.en"
  [languages.en.params]
    madeWith = "Made with [Bear Cub](https://github.com/clente/hugo-bearcub)"

[params]
  title = "Dante's Blog"
  description = "Hi! I'm Dante Zulli"
  # favicon = "images/favicon.png"
  dateFormat = "2006-01-02"
  hideUntranslated = false
  [params.social]
    linkedin = "dante-zulli"
  [params.author]
    name = "Dante Zulli"
    email = "dantezulli2004@gmail.com"
