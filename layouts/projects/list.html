{{ define "main" }}
<content>
    <h1>{{ .Title }}</h1>
    <ul class="blog-posts">
        {{ range .Pages }}
        <li>
            {{ if .Params.link }}
            <a href="{{ .Params.link }}" target="_blank">{{ .Title }} ↪</a>
            {{ else }}
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            {{ end }}
        </li>
        {{ else }}
        <li>{{ i18n "no-posts" }}</li>
        {{ end }}
    </ul>
</content>
{{ end }}
